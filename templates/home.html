<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Doctor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="video-bg">
    <video autoplay muted loop src="/static/watermarked_preview.mp4" alt="Tech Background" class="bg-gif" >
    </div>

    <nav class="glass-nav">
        <div class="logo">Code<span>Doctor</span></div>
        <div class="nav-items">
            <button id="theme-toggle" class="theme-toggle"><i class="fas fa-sun"></i></button>
            <a href="https://github.com/Akshat-Mishra-py" target="_blank" class="gh-link"><i class="fab fa-github"></i></a>
        </div>
    </nav>

    <header class="hero">
        <h1 class="gradient-text">The Code Doctor</h1>
        <p>Auto Fix your code</p>
    </header>

    <section id="projects" class="grid-container">
        <div id="repo-grid" class="repo-grid">
            </div>
    </section>

    <!-- Code Viewer Section -->
    <form action="/profile", method="POST">
        <section class="code-viewer-section">
            <div class="code-viewer-container">
            <div class="code-viewer-header">
                <h2>Code Viewer</h2>
                <p>Paste your code for analysis</p>
            </div>
            
            <div class="code-viewer-wrapper">
                <div class="code-input-area">
                    <div class="input-header">
                        <label for="language-select">Language</label>
                        <select name="language" id="language-select" class="language-select">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="cpp">C++</option>
                            <option value="csharp">C#</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                            <option value="php">PHP</option>
                            <option value="sql">SQL</option>
                        </select>
                    </div>
                    <textarea name="code" id="code-input" class="code-textarea" placeholder="Paste your code here..."></textarea>
                </div>
                
                <div class="code-display-area">
                    <div class="display-header">
                        <span class="lang-badge" id="lang-badge">JavaScript</span>
                        <button class="copy-btn" id="copy-btn">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <pre class="code-display"><code id="code-output" class="language-javascript"></code></pre>
                </div>
            </div>
        </div>
        </section>
    </form> 

    <section>
        <div class="fix-button-container">
            <img id="loading" src="{{ url_for('static', filename='Loading.webp') }}" alt="Code Doctor"
            style="display:none; width: 50px; height: 50px; filter: sepia(1);">
            <Button class="Fix-button" id="fix-btn">Fix Code</Button>
        </div>
    </section>
    <!-- Prism.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
